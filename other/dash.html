<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #000;
      color: #e5e5e5;
      font-family: "Inter", sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
    }

    .glow {
      box-shadow: 0 0 30px rgba(255,255,255,0.06);
    }

    .soft-glow:hover {
      box-shadow: 0 0 40px rgba(255,255,255,0.12);
    }
  </style>
</head>

<body class="min-h-screen">

  <!-- Header -->
  <div class="w-full p-6 flex items-center">
    <h1 class="text-3xl font-semibold tracking-wide text-white">
      Dashboard
    </h1>
  </div>

  <!-- Grid -->
  <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <div class="card glow soft-glow p-6 rounded-2xl transition">
      <p class="text-xs text-gray-500 mb-2">users in chats</p>
      <h2 id="current-user-count" class="text-4xl font-semibold text-white">0</h2>
    </div>

    <div class="card glow soft-glow p-6 rounded-2xl transition">
      <p class="text-xs text-gray-500 mb-2">total chats</p>
      <h2 id="total-chats" class="text-4xl font-semibold text-white">0</h2>
    </div>

    <div class="card glow soft-glow p-6 rounded-2xl transition">
      <p class="text-xs text-gray-500 mb-2">total users</p>
      <h2 id="total-users" class="text-4xl font-semibold text-white">0</h2>
    </div>

    <div class="card glow soft-glow p-6 rounded-2xl transition">
      <p class="text-xs text-gray-500 mb-2">messages</p>
      <h2 id="total-messages" class="text-4xl font-semibold text-white">0</h2>
    </div>

    <div class="card glow soft-glow p-6 rounded-2xl transition">
      <p class="text-xs text-gray-500 mb-2">attachments</p>
      <h2 id="total-attachments" class="text-4xl font-semibold text-white">0</h2>
    </div>

  </div>

  <script>
    let userCount = 0;
    let totalChats = 0;
    let totalUsers = 0;
    let totalMessages = 0;
    let totalAttachments = 0;
    
    function animateValue(element, start, end, duration = 600) {
      let startTime = null;

      function update(currentTime) {
        if (!startTime) startTime = currentTime;
        const progress = Math.min((currentTime - startTime) / duration, 1);
        const value = Math.floor(progress * (end - start) + start);
        element.innerText = value;
        if (progress < 1) requestAnimationFrame(update);
      }

      requestAnimationFrame(update);
    }

    async function fetchStats() {
      const response = await fetch("/api/stats");
      const data = await response.json();

      animateValue(document.getElementById("current-user-count"), userCount, data.currentUserCount);
      animateValue(document.getElementById("total-chats"), totalChats, data.totalChats);
      animateValue(document.getElementById("total-users"), totalUsers, data.totalUsers);
      animateValue(document.getElementById("total-messages"), totalMessages, data.messageCount);
      animateValue(document.getElementById("total-attachments"), totalAttachments, data.totalAttachments);
      userCount = data.currentUserCount;
      totalChats = data.totalChats;
      totalUsers = data.totalUsers;
      totalMessages = data.messageCount;
      totalAttachments = data.totalAttachments;
      
    }

    setInterval(fetchStats, 5000);
    fetchStats();
  </script>

</body>
</html>
